<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" rx="10" fill="#f8f9fa"/>
  
  <!-- Central Hub: Event Bus -->
  <rect x="300" y="200" width="200" height="100" rx="8" fill="#4A90E2" stroke="#2171C1" stroke-width="3"/>
  <text x="400" y="245" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">MessageCenter</text>
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle">(Event-Bus)</text>

  <!-- Producers (Left Side) -->
  <g>
    <rect x="50" y="80" width="180" height="60" rx="5" fill="#E8F4FD" stroke="#4A90E2" stroke-width="2"/>
    <text x="140" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">CardInput</text>
    <path d="M230 110 L290 210" stroke="#4A90E2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="235" y="135" width="60" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="265" y="148" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(30 265 148)">OnClick</text>
  </g>

  <g>
    <rect x="50" y="220" width="180" height="60" rx="5" fill="#E8F4FD" stroke="#4A90E2" stroke-width="2"/>
    <text x="140" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">GameManager</text>
    <path d="M230 250 L290 250" stroke="#4A90E2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="235" y="225" width="60" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="265" y="238" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">SetLevel</text>
  </g>

  <g>
    <rect x="50" y="360" width="180" height="60" rx="5" fill="#E8F4FD" stroke="#4A90E2" stroke-width="2"/>
    <text x="140" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">BoardManager</text>
    <path d="M230 390 L290 290" stroke="#4A90E2" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <rect x="235" y="325" width="70" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="270" y="338" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-30 270 338)">OnComplete</text>
  </g>

  <!-- Consumers (Right Side) -->
  <g>
    <rect x="570" y="80" width="180" height="60" rx="5" fill="#FFF4E5" stroke="#F5A623" stroke-width="2"/>
    <text x="660" y="115" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">AudioManager</text>
    <path d="M510 210 L570 110" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowhead2)"/>
    
    <rect x="495" y="135" width="70" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="530" y="148" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(-30 530 148)">PlayMatch</text>
  </g>

  <g>
    <rect x="570" y="220" width="180" height="60" rx="5" fill="#FFF4E5" stroke="#F5A623" stroke-width="2"/>
    <text x="660" y="255" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">UI (Texts)</text>
    <path d="M510 250 L570 250" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowhead2)"/>
    
    <rect x="505" y="225" width="60" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="535" y="238" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">Update</text>
  </g>

  <g>
    <rect x="570" y="360" width="180" height="60" rx="5" fill="#FFF4E5" stroke="#F5A623" stroke-width="2"/>
    <text x="660" y="395" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">CardView</text>
    <path d="M510 290 L570 390" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowhead2)"/>
    
    <rect x="495" y="325" width="70" height="16" fill="white" fill-opacity="0.8" rx="3"/>
    <text x="530" y="338" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle" transform="rotate(30 530 338)">StartBoard</text>
  </g>

  <!-- Legend & Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90E2" />
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F5A623" />
    </marker>
  </defs>

  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#333" text-anchor="middle">Decoupled Architecture with BoilerCore Event-Bus</text>
  <text x="400" y="470" font-family="Arial, sans-serif" font-size="12" fill="#888" text-anchor="middle">Producers send messages independently • Consumers react to messages without direct coupling</text>
</svg>