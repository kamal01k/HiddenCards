<svg width="800" height="500" viewBox="0 0 800 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" rx="15" fill="#1A1C1E"/>
  
  <!-- Header -->
  <text x="400" y="55" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="bold" fill="#E2E2E6" text-anchor="middle">Event-Bus: Engineering for Simplicity</text>
  <text x="400" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#909094" text-anchor="middle">Modular "Plug-and-Play" Architecture for Unity</text>

  <!-- Central Bus Track -->
  <rect x="100" y="260" width="600" height="20" rx="10" fill="#313135"/>
  <rect x="120" y="264" width="560" height="12" rx="6" fill="#4A90E2" fill-opacity="0.3"/>
  <text x="400" y="250" font-family="monospace" font-size="16" font-weight="bold" fill="#4A90E2" text-anchor="middle">CORE MESSAGE BUS</text>

  <!-- Feature Modules - Top Row -->
  <g transform="translate(100, 110)">
    <rect width="180" height="80" rx="8" fill="#2D2F31" stroke="#4A90E2" stroke-width="2"/>
    <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E2E2E6" text-anchor="middle">UI System</text>
    <text x="90" y="55" font-family="sans-serif" font-size="11" fill="#909094" text-anchor="middle">Reactive Updates</text>
    <path d="M90 80 L90 150" stroke="#4A90E2" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="150" r="4" fill="#4A90E2"/>
  </g>

  <g transform="translate(310, 110)">
    <rect width="180" height="80" rx="8" fill="#2D2F31" stroke="#00C853" stroke-width="2"/>
    <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E2E2E6" text-anchor="middle">Audio Engine</text>
    <text x="90" y="55" font-family="sans-serif" font-size="11" fill="#909094" text-anchor="middle">Decoupled SFX</text>
    <path d="M90 80 L90 150" stroke="#00C853" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="150" r="4" fill="#00C853"/>
  </g>

  <g transform="translate(520, 110)">
    <rect width="180" height="80" rx="8" fill="#2D2F31" stroke="#FFD600" stroke-width="2"/>
    <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E2E2E6" text-anchor="middle">Analytics</text>
    <text x="90" y="55" font-family="sans-serif" font-size="11" fill="#909094" text-anchor="middle">Zero Ref Logic</text>
    <path d="M90 80 L90 150" stroke="#FFD600" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="150" r="4" fill="#FFD600"/>
  </g>

  <!-- Feature Modules - Bottom Row -->
  <g transform="translate(205, 330)">
    <rect width="180" height="80" rx="8" fill="#2D2F31" stroke="#FF5252" stroke-width="2"/>
    <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E2E2E6" text-anchor="middle">Save System</text>
    <text x="90" y="55" font-family="sans-serif" font-size="11" fill="#909094" text-anchor="middle">State Persistence</text>
    <path d="M90 0 L90 -50" stroke="#FF5252" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="-50" r="4" fill="#FF5252"/>
  </g>

  <g transform="translate(415, 330)">
    <rect width="180" height="80" rx="8" fill="#2D2F31" stroke="#AA00FF" stroke-width="2"/>
    <text x="90" y="35" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E2E2E6" text-anchor="middle">VFX / Particles</text>
    <text x="90" y="55" font-family="sans-serif" font-size="11" fill="#909094" text-anchor="middle">Dynamic Feedback</text>
    <path d="M90 0 L90 -50" stroke="#AA00FF" stroke-width="2" stroke-dasharray="4 4"/>
    <circle cx="90" cy="-50" r="4" fill="#AA00FF"/>
  </g>

  <!-- Ease of Use Code Snippet Box -->
  <rect x="100" y="435" width="600" height="45" rx="8" fill="#121416" stroke="#4A90E2" stroke-opacity="0.5"/>
  <text x="120" y="452" font-family="monospace" font-size="11" fill="#00C853">// Single line to trigger entire ecosystem</text>
  <text x="120" y="468" font-family="monospace" font-size="14" fill="#E2E2E6">MessageCenter.Send(BoardNote.OnLevelComplete, currentLevel);</text>

  <!-- Benefits Text (Nudged to "Safe Zone" at y=215) -->
  <g transform="translate(50, 215)">
    <text x="0" y="0" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90E2">✓ ZERO COUPLING</text>
    <text x="0" y="18" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90E2">✓ ASYNC SUPPORT</text>
  </g>
  
  <g transform="translate(750, 215)">
    <text x="0" y="0" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90E2" text-anchor="end">TYPE SAFE ✓</text>
    <text x="0" y="18" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4A90E2" text-anchor="end">SCALABLE ✓</text>
  </g>
</svg>